<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/Add_Admin.css">
    <title>Document</title>
</head>
<body>
    <div class="registrAdmin">
        <form action="" name="registrAdmin" method="post">
            <table>
                <thead>
                    <th colspan="2">
                        <h2>Form Registration Admin</h2>
                    </th>
                </thead>

                <tbody>
                    
                    <tr>
                        <td>
                            <label for="login">LOGIN:</label>
                        </td>
                        <td class="inputs">
                            <input type="text" name="login" id="login">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="password">PASSWORD:</label>
                        </td>
                        <td class="inputs">
                            <input type="text" name="password" id="password">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="name">NAME:</label>
                        </td>
                        <td class="inputs">
                            <input type="text" name="name" id="name">
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <label for="role">ROLE:</label>
                        </td>
                        <td class="inputs">
                            <input type="text" name="role" id="role">
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="butt">
                <button type="submit" name="addAdmin" id="addAdmin">Add Admin</button>
            </div>
        </form>
    </div>

<script src="/JS/Controller/Add_Admin_Controller.js" type="module"></script>
</body>
</html>
